<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모의 공격 시스템 레이아웃</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel for JSX (CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 기본 폰트 설정 */
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        /* 단계 전환 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==========================================
        // 아이콘 컴포넌트 (Lucide 대체용 인라인 SVG)
        // ==========================================
        const IconMonitor = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>;
        const IconShieldAlert = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconBarChart3 = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>;
        const IconSettings = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconLogOut = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const IconCamera = ({size=40, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
        const IconMic = ({size=40, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
        const IconCarFront = ({size=40, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21 8-2-2H5L3 8"/><path d="M17 22v-2"/><path d="M7 22v-2"/><path d="M21 8v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"/><path d="M5 8h14"/><circle cx="7" cy="14" r="1"/><circle cx="17" cy="14" r="1"/></svg>;
        const IconSearch = ({size=16, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconChevronRight = ({size=16, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;

        // 추가된 대시보드용 아이콘들
        const IconActivity = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const IconAlertTriangle = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
        const IconCheckCircle = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconClock = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconServer = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>;

        // 결과 분석용 추가 아이콘
        const IconDownload = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconFilter = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const IconImageIcon = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const IconArrowRight = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const IconTarget = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;

        // 프로젝트 관리용 추가 아이콘
        const IconPlus = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconTrash2 = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconEdit = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconDatabase = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const IconBox = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
        const IconUploadCloud = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;

        // ==========================================
        // 메인 App 컴포넌트
        // ==========================================
        function App() {
          const [currentPage, setCurrentPage] = useState('login');

          if (currentPage === 'login') {
            return <LoginPage onLogin={() => setCurrentPage('dashboard')} />;
          }

          return (
            <div className="flex h-screen w-full bg-gray-50 text-slate-800 font-sans">
              {/* LNB (Left Navigation Bar) */}
              <aside className="w-64 bg-white border-r border-slate-300 flex flex-col justify-between">
                <div>
                  <div className="h-16 flex items-center px-6 border-b border-slate-300">
                    <h1 className="text-lg font-bold">엣지 AI 모의공격</h1>
                  </div>
                  <nav className="p-4 space-y-2">
                    <NavItem
                      icon={<IconMonitor size={20} />}
                      label="대시보드"
                      isActive={currentPage === 'dashboard'}
                      onClick={() => setCurrentPage('dashboard')}
                    />
                    <NavItem
                      icon={<IconShieldAlert size={20} />}
                      label="모의 공격 수행"
                      isActive={currentPage === 'attack_exec'}
                      onClick={() => setCurrentPage('attack_exec')}
                    />
                    <NavItem
                      icon={<IconBarChart3 size={20} />}
                      label="모의 공격 결과"
                      isActive={currentPage === 'attack_result'}
                      onClick={() => setCurrentPage('attack_result')}
                    />
                    <NavItem
                      icon={<IconSettings size={20} />}
                      label="프로젝트 관리"
                      isActive={currentPage === 'project_manage'}
                      onClick={() => setCurrentPage('project_manage')}
                    />
                  </nav>
                </div>
                <div className="p-4 border-t border-slate-300">
                  <button
                    onClick={() => setCurrentPage('login')}
                    className="flex items-center space-x-2 text-slate-500 hover:text-slate-800 w-full p-2"
                  >
                    <IconLogOut size={20} />
                    <span>로그아웃</span>
                  </button>
                </div>
              </aside>

              {/* Main Content Area */}
              <main className="flex-1 flex flex-col overflow-hidden">
                {/* Header (Top bar) */}
                <header className="h-16 bg-white border-b border-slate-300 flex items-center px-8">
                  <h2 className="text-xl font-semibold">
                    {currentPage === 'dashboard' && '기본 페이지 (대시보드)'}
                    {currentPage === 'attack_exec' && '모의 공격 페이지'}
                    {currentPage === 'attack_result' && '모의 공격 결과'}
                    {currentPage === 'project_manage' && '프로젝트 관리'}
                  </h2>
                </header>

                {/* Content Body */}
                <div className="flex-1 overflow-auto p-8">
                  <div className="bg-white border border-slate-300 h-full p-6 shadow-sm">
                    {currentPage === 'dashboard' && <Dashboard />}
                    {currentPage === 'attack_exec' && <AttackExecution />}
                    {currentPage === 'attack_result' && <AttackResults />}
                    {currentPage === 'project_manage' && <ProjectManagement />}
                  </div>
                </div>
              </main>
            </div>
          );
        }

        // ==========================================
        // 1. 로그인 페이지 컴포넌트
        // ==========================================
        function LoginPage({ onLogin }) {
          return (
            <div className="min-h-screen w-full flex flex-col items-center justify-center bg-white">
              <div className="text-center mb-10">
                <h1 className="text-3xl font-bold text-slate-800 mb-2">모의 공격 시스템</h1>
                <h2 className="text-xl font-medium text-slate-600">(엣지 AI 취약성 분석)</h2>
              </div>

              <div className="w-full max-w-md">
                <div className="mb-4">
                  <label className="block text-sm text-slate-500 mb-1">아이디 입력</label>
                  <input type="text" className="w-full border border-slate-300 p-3 outline-none focus:border-slate-500" placeholder="ID" />
                </div>
                <div className="mb-6">
                  <label className="block text-sm text-slate-500 mb-1">비밀번호 입력</label>
                  <input type="password" className="w-full border border-slate-300 p-3 outline-none focus:border-slate-500" placeholder="Password" />
                </div>

                <button
                  onClick={onLogin}
                  className="w-full bg-black text-white p-3 font-semibold hover:bg-slate-800 transition"
                >
                  로그인
                </button>

                <div className="mt-4 flex items-center">
                  <input type="checkbox" id="saveId" className="mr-2" />
                  <label htmlFor="saveId" className="text-sm text-slate-600">아이디 저장</label>
                </div>

                <div className="mt-8 text-center text-sm text-slate-400">
                  <p>신규 계정 생성 및 비밀번호 초기화는 관리자에게 문의하세요.</p>
                </div>
              </div>

              <div className="fixed bottom-8 left-8 border border-slate-300 p-4 bg-slate-50">
                <h3 className="font-bold text-slate-700">관리자 페이지</h3>
                <p className="text-sm text-slate-500">- 개발팀 만 로그인 가능</p>
              </div>
            </div>
          );
        }

        // ==========================================
        // 2. 대시보드 컴포넌트
        // ==========================================
        function Dashboard() {
          return (
            <div className="h-full flex flex-col space-y-6 overflow-y-auto pb-4 pr-2 animate-fadeIn">
              {/* 상단 타이틀 및 빠른 실행 버튼 */}
              <div className="flex justify-between items-center mb-2">
                <div>
                  <h2 className="text-2xl font-bold text-slate-800">엣지 AI 모의 공격 대시보드</h2>
                  <p className="text-slate-500 mt-1 text-sm">시스템 전체 모의 공격 현황 및 AI 모델 취약성 요약입니다.</p>
                </div>
                <button className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-bold flex items-center shadow-sm transition transform hover:-translate-y-0.5">
                  <IconShieldAlert size={18} className="mr-2" /> 새 모의 공격 시작
                </button>
              </div>

              {/* 핵심 KPI 카드 영역 */}
              <div className="grid grid-cols-4 gap-4">
                <DashboardCard title="누적 검증 모델" value="12" icon={<IconServer size={24} className="text-blue-600"/>} trend="+2 이번 달" trendUp={true} />
                <DashboardCard title="총 모의 공격 건수" value="3,450" icon={<IconActivity size={24} className="text-indigo-600"/>} trend="+150 이번 주" trendUp={true} />
                <DashboardCard title="평균 공격 성공률" value="24.8%" icon={<IconAlertTriangle size={24} className="text-rose-500"/>} trend="-2.1% 지난 달 대비" trendUp={true} /* 성공률 감소가 좋은 것 */ />
                <DashboardCard title="안전 검증 완료" value="8" icon={<IconCheckCircle size={24} className="text-emerald-500"/>} trend="+1 이번 주" trendUp={true} />
              </div>

              {/* 차트 및 상태 영역 */}
              <div className="grid grid-cols-3 gap-6">
                {/* 트렌드 차트 (가상 UI) */}
                <div className="col-span-2 bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
                    <IconBarChart3 size={18} className="mr-2 text-slate-500"/> 최근 30일 공격 성공률 (취약성) 추이
                  </h3>
                  <div className="flex-1 bg-slate-50 rounded-lg border border-slate-100 flex items-end justify-between p-4 px-8 min-h-[220px]">
                    {/* CSS를 이용한 막대 그래프 데모 */}
                    {[40, 55, 30, 70, 45, 60, 25, 35, 50, 20].map((h, i) => (
                      <div key={i} className="w-10 bg-blue-200 hover:bg-blue-400 rounded-t-sm relative group cursor-pointer transition-all" style={{ height: `${h}%` }}>
                         <div className="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none">
                            {h}% 성공
                         </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 엣지 디바이스 상태 리스트 */}
                <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
                    <IconMonitor size={18} className="mr-2 text-slate-500"/> 엣지 디바이스 상태
                  </h3>
                  <div className="flex-1 space-y-3 overflow-y-auto pr-1">
                    <DeviceStatusItem name="CCTV Node 01" status="online" type="객체 탐지 (YOLOv5)" />
                    <DeviceStatusItem name="Voice Assistant Hub" status="offline" type="음성 인식 (Whisper)" />
                    <DeviceStatusItem name="Auto-Drive Vision" status="online" type="이미지 분류 (ResNet)" />
                  </div>
                </div>
              </div>

              {/* 최근 수행 내역 데이터 테이블 */}
              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold text-slate-800 flex items-center">
                    <IconClock size={18} className="mr-2 text-slate-500"/> 최근 모의 공격 수행 내역
                  </h3>
                  <button className="text-sm font-semibold text-blue-600 hover:underline">전체 보기</button>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-left">
                    <thead className="text-slate-500 bg-slate-50 border-y border-slate-200">
                      <tr>
                        <th className="py-3 px-4 font-medium">상태</th>
                        <th className="py-3 px-4 font-medium">테스트 모델</th>
                        <th className="py-3 px-4 font-medium">공격 유형</th>
                        <th className="py-3 px-4 font-medium">성공률(취약도)</th>
                        <th className="py-3 px-4 font-medium">수행 일시</th>

          return (
            <button
              onClick={onClick}
              className={`w-full flex items-center space-x-3 px-4 py-3 text-left border ${
                isActive
                  ? 'bg-blue-50 text-blue-800 border-blue-200 font-semibold'
                  : 'text-slate-600 border-transparent hover:bg-slate-50 hover:border-slate-200'
              }`}
            >
              <span className={isActive ? 'text-blue-600' : 'text-slate-400'}>{icon}</span>
              <span>{label}</span>
            </button>
          );
        }

        // 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
